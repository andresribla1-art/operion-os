<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" role="img">
  <title>OPERION — Sovereign Emblem (Light)</title>
  <desc>OPERION sovereign mark: titanium hex, deep cobalt Ion core. Transparent field — use on light backgrounds (#F5F5F7 or white). Production asset.</desc>

  <defs>

    <!-- ── SHADOW BLUR ───────────────────────────────────────────── -->
    <filter id="shadowBlur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>

    <!-- ── TITANIUM LIQUID METAL — light variant ─────────────────── -->
    <linearGradient id="titaniumGrad"
      x1="73" y1="70" x2="247" y2="270"
      gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#484858"/>
      <stop offset="11%"  stop-color="#7A7A8C"/>
      <stop offset="22%"  stop-color="#A8A8BC"/>
      <stop offset="32%"  stop-color="#C8C8D8"/>
      <stop offset="41%"  stop-color="#DCDCE8"/>
      <stop offset="48%"  stop-color="#E4E4F0"/>
      <stop offset="58%"  stop-color="#C4C4D4"/>
      <stop offset="72%"  stop-color="#8E8E9E"/>
      <stop offset="86%"  stop-color="#5A5A6A"/>
      <stop offset="100%" stop-color="#343444"/>
    </linearGradient>

    <!-- ── DEEP COBALT CORE ──────────────────────────────────────── -->
    <radialGradient id="coreGrad"
      cx="151" cy="160" r="40"
      gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1A2B72"/>
      <stop offset="28%"  stop-color="#131E58"/>
      <stop offset="60%"  stop-color="#0D1440"/>
      <stop offset="100%" stop-color="#080C28"/>
    </radialGradient>

    <!-- Core specular catch-light -->
    <radialGradient id="coreCatch"
      cx="147" cy="156" r="20"
      gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#5870CC" stop-opacity="0.65"/>
      <stop offset="45%"  stop-color="#2E3E90" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#101828" stop-opacity="0"/>
    </radialGradient>

    <!-- ── SUBTLE GLOW — for light backgrounds ───────────────────── -->
    <filter id="glowOuter" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix type="matrix"
        values="0.4 0   0   0 0.08
                0   0.5 0   0 0.10
                0   0   1   0 0.28
                0   0   0   0.5 0"
        in="blur"/>
    </filter>

    <filter id="glowRim" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="3"/>
    </filter>

    <!-- ── BEVEL / SPECULAR LIFT ──────────────────────────────────── -->
    <filter id="metalBevel"
      x="-35%" y="-35%" width="170%" height="170%"
      color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="bumpMap"/>
      <feSpecularLighting
        in="bumpMap"
        surfaceScale="4"
        specularConstant="1.6"
        specularExponent="36"
        lighting-color="#FFFFFF"
        result="specularOut">
        <fePointLight x="68" y="32" z="120"/>
      </feSpecularLighting>
      <feComposite in="specularOut" in2="SourceAlpha" operator="in" result="specularClipped"/>
      <feBlend in="SourceGraphic" in2="specularClipped" mode="screen"/>
    </filter>

    <!-- ── WORDMARK METALLIC SWEEP — dark on light ───────────────── -->
    <linearGradient id="wordmarkGrad"
      x1="55" y1="334" x2="265" y2="334"
      gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#404050"/>
      <stop offset="25%"  stop-color="#6A6A7A"/>
      <stop offset="47%"  stop-color="#8A8A9C"/>
      <stop offset="62%"  stop-color="#6E6E80"/>
      <stop offset="100%" stop-color="#383848"/>
    </linearGradient>

  </defs>


  <!-- ═══════════════════════════════════════════════════════════════
       FIELD — transparent (light background variant)
  ═══════════════════════════════════════════════════════════════════ -->
  <!-- No background fill — transparent for use on white/light surfaces -->

  <!-- Drop shadow for depth against light background -->
  <polygon
    points="246.6,120 160,70 73.4,120 73.4,220 160,270 246.6,220"
    fill="none"
    stroke="rgba(26,43,114,0.08)"
    stroke-width="14"
    stroke-linejoin="miter"
    transform="translate(2, 3)"
    filter="url(#shadowBlur)"
  />

  <!-- ═══════════════════════════════════════════════════════════════
       HEXAGON — titanium liquid-metal stroke + bevel
  ═══════════════════════════════════════════════════════════════════ -->
  <polygon
    points="246.6,120 160,70 73.4,120 73.4,220 160,270 246.6,220"
    fill="none"
    stroke="url(#titaniumGrad)"
    stroke-width="3"
    stroke-linejoin="miter"
    filter="url(#metalBevel)"
  />

  <!-- Top-edge ambient catch -->
  <path
    d="M73.4,120 L160,70 L246.6,120"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="0.6"
    stroke-linejoin="miter"
    opacity="0.55"
  />


  <!-- ═══════════════════════════════════════════════════════════════
       ION CORE — cobalt sphere
  ═══════════════════════════════════════════════════════════════════ -->

  <!-- Layer 1 — Outer diffuse halo (subtle on light BG) -->
  <circle cx="160" cy="170" r="40"
    fill="rgba(26,43,114,0.10)"
    filter="url(#glowOuter)"
  />

  <!-- Layer 2 — Inner rim glow -->
  <circle cx="160" cy="170" r="34"
    fill="none"
    stroke="rgba(88,112,204,0.30)"
    stroke-width="2"
    filter="url(#glowRim)"
  />

  <!-- Layer 3 — Core body: deep cobalt fill -->
  <circle cx="160" cy="170" r="34" fill="url(#coreGrad)"/>

  <!-- Layer 4 — Surface catch-light -->
  <circle cx="160" cy="170" r="34" fill="url(#coreCatch)"/>

  <!-- Layer 5 — Titanium ring -->
  <circle
    cx="160" cy="170" r="34"
    fill="none"
    stroke="url(#titaniumGrad)"
    stroke-width="2"
    filter="url(#metalBevel)"
  />


  <!-- ═══════════════════════════════════════════════════════════════
       RADIAL VECTORS — 6 arms at hex vertex angles
  ═══════════════════════════════════════════════════════════════════ -->
  <!-- 30° -->
  <line x1="189.4" y1="153.0" x2="224.9" y2="132.5"
    stroke="url(#titaniumGrad)" stroke-width="1.5" stroke-linecap="square"/>
  <!-- 90° -->
  <line x1="160.0" y1="136.0" x2="160.0" y2="95.0"
    stroke="url(#titaniumGrad)" stroke-width="1.5" stroke-linecap="square"/>
  <!-- 150° -->
  <line x1="130.6" y1="153.0" x2="95.1" y2="132.5"
    stroke="url(#titaniumGrad)" stroke-width="1.5" stroke-linecap="square"/>
  <!-- 210° -->
  <line x1="130.6" y1="187.0" x2="95.1" y2="207.5"
    stroke="url(#titaniumGrad)" stroke-width="1.5" stroke-linecap="square"/>
  <!-- 270° -->
  <line x1="160.0" y1="204.0" x2="160.0" y2="245.0"
    stroke="url(#titaniumGrad)" stroke-width="1.5" stroke-linecap="square"/>
  <!-- 330° -->
  <line x1="189.4" y1="187.0" x2="224.9" y2="207.5"
    stroke="url(#titaniumGrad)" stroke-width="1.5" stroke-linecap="square"/>


  <!-- ═══════════════════════════════════════════════════════════════
       DIVIDER
  ═══════════════════════════════════════════════════════════════════ -->
  <line x1="112" y1="300" x2="208" y2="300" stroke="rgba(26,43,114,0.18)" stroke-width="0.75"/>


  <!-- ═══════════════════════════════════════════════════════════════
       WORDMARK
  ═══════════════════════════════════════════════════════════════════ -->
  <text
    x="151"
    y="334"
    font-family="'Helvetica Neue', 'Arial', sans-serif"
    font-weight="200"
    font-size="21"
    letter-spacing="18"
    fill="url(#wordmarkGrad)"
    dominant-baseline="middle"
    text-anchor="middle"
  >OPERION</text>

</svg>
