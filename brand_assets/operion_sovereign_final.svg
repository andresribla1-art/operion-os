<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" role="img">
  <title>OPERION — Sovereign Mark (Final)</title>
  <desc>OPERION sovereign mark: titanium hex, deep cobalt Ion core with contained cold-light emanation. Obsidian matte field.</desc>

  <defs>

    <!-- ── BACKGROUND GRAIN ──────────────────────────────────────── -->
    <filter id="grain" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.78" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise"/>
    </filter>

    <!-- ── SHADOW BLUR ───────────────────────────────────────────── -->
    <filter id="shadowBlur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>

    <!-- ── TITANIUM LIQUID METAL ─────────────────────────────────── -->
    <linearGradient id="titaniumGrad"
      x1="73" y1="70" x2="247" y2="270"
      gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#383848"/>
      <stop offset="11%"  stop-color="#888898"/>
      <stop offset="22%"  stop-color="#C4C4D8"/>
      <stop offset="32%"  stop-color="#E8E8F6"/>
      <stop offset="41%"  stop-color="#F8F8FF"/>
      <stop offset="48%"  stop-color="#FFFFFF"/>
      <stop offset="58%"  stop-color="#E2E2F0"/>
      <stop offset="72%"  stop-color="#A8A8C0"/>
      <stop offset="86%"  stop-color="#686878"/>
      <stop offset="100%" stop-color="#2C2C3C"/>
    </linearGradient>

    <!-- ── DEEP COBALT CORE ──────────────────────────────────────── -->
    <radialGradient id="coreGrad"
      cx="151" cy="160" r="40"
      gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1A2244"/>
      <stop offset="28%"  stop-color="#121830"/>
      <stop offset="60%"  stop-color="#0C101E"/>
      <stop offset="100%" stop-color="#050710"/>
    </radialGradient>

    <!-- Core specular catch-light -->
    <radialGradient id="coreCatch"
      cx="147" cy="156" r="20"
      gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#5870B8" stop-opacity="0.60"/>
      <stop offset="45%"  stop-color="#2C3C80" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#101828" stop-opacity="0"/>
    </radialGradient>

    <!-- ── ION GLOW — COLD LED EMANATION ─────────────────────────── -->
    <!-- Outer halo: wide diffuse bloom, reads as light escaping from depth -->
    <filter id="glowOuter" x="-120%" y="-120%" width="340%" height="340%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <!-- Slightly enhance the cold-light channel -->
      <feColorMatrix type="matrix"
        values="0.85 0   0   0 0.05
                0    0.9 0   0 0.06
                0    0   1   0 0.08
                0    0   0   1 0"
        in="blur"/>
    </filter>

    <!-- Inner rim glow: tight, contained — the active-state ring brightness -->
    <filter id="glowRim" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="5"/>
    </filter>

    <!-- ── BEVEL / SPECULAR LIFT ──────────────────────────────────── -->
    <filter id="metalBevel"
      x="-35%" y="-35%" width="170%" height="170%"
      color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.2" result="bumpMap"/>
      <feSpecularLighting
        in="bumpMap"
        surfaceScale="5"
        specularConstant="1.9"
        specularExponent="42"
        lighting-color="#FFFFFF"
        result="specularOut">
        <fePointLight x="68" y="32" z="140"/>
      </feSpecularLighting>
      <feComposite in="specularOut" in2="SourceAlpha" operator="in" result="specularClipped"/>
      <feBlend in="SourceGraphic" in2="specularClipped" mode="screen"/>
    </filter>

    <!-- ── WORDMARK METALLIC SWEEP ───────────────────────────────── -->
    <linearGradient id="wordmarkGrad"
      x1="55" y1="334" x2="265" y2="334"
      gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#505060"/>
      <stop offset="25%"  stop-color="#A8A8B8"/>
      <stop offset="47%"  stop-color="#D4D4E0"/>
      <stop offset="62%"  stop-color="#B0B0C0"/>
      <stop offset="100%" stop-color="#484858"/>
    </linearGradient>

  </defs>


  <!-- ═══════════════════════════════════════════════════════════════
       FIELD
  ═══════════════════════════════════════════════════════════════════ -->
  <rect width="320" height="400" fill="#0D0D0D"/>
  <rect width="320" height="400" fill="#909090" opacity="0.035" filter="url(#grain)"/>


  <!-- ═══════════════════════════════════════════════════════════════
       HEXAGON
  ═══════════════════════════════════════════════════════════════════ -->

  <!-- Depth shadow -->
  <polygon
    points="246.6,120 160,70 73.4,120 73.4,220 160,270 246.6,220"
    fill="none"
    stroke="#000000"
    stroke-width="10"
    stroke-linejoin="miter"
    transform="translate(2.5, 2.5)"
    opacity="0.55"
    filter="url(#shadowBlur)"
  />

  <!-- Main titanium hex -->
  <polygon
    points="246.6,120 160,70 73.4,120 73.4,220 160,270 246.6,220"
    fill="none"
    stroke="url(#titaniumGrad)"
    stroke-width="3"
    stroke-linejoin="miter"
    filter="url(#metalBevel)"
  />

  <!-- Top-edge ambient catch -->
  <path
    d="M73.4,120 L160,70 L246.6,120"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="0.8"
    stroke-linejoin="miter"
    opacity="0.28"
  />


  <!-- ═══════════════════════════════════════════════════════════════
       ION CORE — glow layers rendered FIRST (behind the core body)
  ═══════════════════════════════════════════════════════════════════ -->

  <!-- Layer 1 — Outer diffuse halo: cold blue-white, wide bloom -->
  <!-- Simulates light seeping up from deep within the panel -->
  <circle cx="160" cy="170" r="40"
    fill="#B8E2F4"
    opacity="0.17"
    filter="url(#glowOuter)"
  />

  <!-- Layer 2 — Inner rim glow: tighter, warmer cold light -->
  <!-- Active-state indicator: like Retina display edge or Audi MMI ring -->
  <circle cx="160" cy="170" r="34"
    fill="none"
    stroke="#D4EEFA"
    stroke-width="3"
    opacity="0.22"
    filter="url(#glowRim)"
  />

  <!-- Layer 3 — Core body: deep cobalt fill -->
  <circle cx="160" cy="170" r="34" fill="url(#coreGrad)"/>

  <!-- Layer 4 — Surface catch-light: iridescent cobalt bloom -->
  <circle cx="160" cy="170" r="34" fill="url(#coreCatch)"/>

  <!-- Layer 5 — Titanium ring with specular bevel (sits on top) -->
  <circle
    cx="160" cy="170" r="34"
    fill="none"
    stroke="url(#titaniumGrad)"
    stroke-width="2.5"
    filter="url(#metalBevel)"
  />


  <!-- ═══════════════════════════════════════════════════════════════
       RADIAL VECTORS
  ═══════════════════════════════════════════════════════════════════ -->

  <!-- 30° -->
  <line x1="189.4" y1="153.0" x2="224.9" y2="132.5"
    stroke="url(#titaniumGrad)" stroke-width="1.5" stroke-linecap="square"/>
  <!-- 90° -->
  <line x1="160.0" y1="136.0" x2="160.0" y2="95.0"
    stroke="url(#titaniumGrad)" stroke-width="1.5" stroke-linecap="square"/>
  <!-- 150° -->
  <line x1="130.6" y1="153.0" x2="95.1" y2="132.5"
    stroke="url(#titaniumGrad)" stroke-width="1.5" stroke-linecap="square"/>
  <!-- 210° -->
  <line x1="130.6" y1="187.0" x2="95.1" y2="207.5"
    stroke="url(#titaniumGrad)" stroke-width="1.5" stroke-linecap="square"/>
  <!-- 270° -->
  <line x1="160.0" y1="204.0" x2="160.0" y2="245.0"
    stroke="url(#titaniumGrad)" stroke-width="1.5" stroke-linecap="square"/>
  <!-- 330° -->
  <line x1="189.4" y1="187.0" x2="224.9" y2="207.5"
    stroke="url(#titaniumGrad)" stroke-width="1.5" stroke-linecap="square"/>


  <!-- ═══════════════════════════════════════════════════════════════
       DIVIDER
  ═══════════════════════════════════════════════════════════════════ -->
  <line x1="112" y1="300" x2="208" y2="300" stroke="#282838" stroke-width="0.75"/>


  <!-- ═══════════════════════════════════════════════════════════════
       WORDMARK
  ═══════════════════════════════════════════════════════════════════ -->
  <text
    x="151"
    y="334"
    font-family="'Helvetica Neue', 'Arial', sans-serif"
    font-weight="200"
    font-size="21"
    letter-spacing="18"
    fill="url(#wordmarkGrad)"
    dominant-baseline="middle"
    text-anchor="middle"
  >OPERION</text>

</svg>
