/* ── HOOKS & ATOMS ──────────────────────────────────────────────────── */
function useFadeIn() {
  React.useEffect(() => {
    const t = setTimeout(() => {
      const obs = new IntersectionObserver(entries => {
        entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
      }, { threshold:0, rootMargin:'0px 0px -40px 0px' });
      document.querySelectorAll('.fade').forEach(el => obs.observe(el));
    }, 120);
    return () => clearTimeout(t);
  }, []);
}

/* ── EMBLEM — logo component ──────────────────────────────────────── */
/* ghost=true uses the transparent SVG (for low-opacity watermark uses) */
function Emblem({ size=40, opacity=1, ghost=false }) {
  const style = { width:'auto', height:size, objectFit:'contain', display:'block', opacity };
  if (ghost) {
    return <img src="brand_assets/operion_emblem_light.svg" alt="OPERION" style={style}/>;
  }
  return <img
    src="brand_assets/OPERION_REDUCED.png"
    alt="OPERION"
    style={style}
    onError={e => { e.target.onerror = null; e.target.src = 'brand_assets/operion_emblem_light.svg'; }}
  />;
}

function SL({ text }) {
  const parts = text.split('·');
  return (
    <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:52 }}>
      <span style={{ fontFamily:FM, fontSize:10, color:C.ti, letterSpacing:'.06em' }}>{parts[0]?.trim()}</span>

      <span style={{ fontFamily:FB, fontSize:10, fontWeight:500, letterSpacing:'.18em', textTransform:'uppercase', color:C.ti }}>{parts[1]?.trim()}</span>
      <div style={{ flex:1, height:'1px', background:C.ln }}/>
    </div>
  );
}

function H({ h, hb, size='clamp(32px,4vw,52px)' }) {

function Icon({ type, size=20 }) {
  const s = { width:size, height:size, display:'block', strokeWidth:1, stroke:C.ti, fill:'none', strokeLinecap:'round', strokeLinejoin:'round' };
  if(type==='shield') return <svg viewBox="0 0 24 24" style={s}><path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V7L12 2z"/></svg>;

  return null;
}

/* ── APP ──────────────────────────────────────────────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "lang": "es"
}/*EDITMODE-END*/;

function App() {
  const saved = (() => { try { return JSON.parse(localStorage.getItem('op-v6')||'{}'); } catch(e){ return {}; }})();
  const [lang, setLangRaw] = React.useState(saved.lang || TWEAK_DEFAULTS.lang);

  function setLang(l) {
    setLangRaw(l);
    try { localStorage.setItem('op-v6', JSON.stringify({lang:l})); } catch(e){}
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{lang:l}}, '*');
    document.querySelectorAll('[data-lang]').forEach(b => b.classList.toggle('on', b.dataset.lang===l));
  }

  useFadeIn();

  React.useEffect(() => {
    document.documentElement.lang = lang;
    window.addEventListener('message', e => {
      if(e.data?.type==='__activate_edit_mode')   document.getElementById('tp').classList.add('on');
      if(e.data?.type==='__deactivate_edit_mode') document.getElementById('tp').classList.remove('on');
    });
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    document.querySelectorAll('[data-lang]').forEach(b => {
      b.classList.toggle('on', b.dataset.lang===lang);
      b.addEventListener('click', () => setLang(b.dataset.lang));
    });
  }, []);

  return (
    <>
      <Nav lang={lang} setLang={setLang}/>
      <Hero lang={lang}/>
      <ProofBar lang={lang}/>
      <Thesis lang={lang}/>
      <Lane lang={lang}/>
      <Triad lang={lang}/>
      <Metrics lang={lang}/>
      <Agents lang={lang}/>
      <Moat lang={lang}/>
      <Roadmap lang={lang}/>
      <Fiscal lang={lang}/>
      <Pricing lang={lang}/>
      <Founder lang={lang}/>
      <CTA lang={lang}/>
      <Footer lang={lang}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
